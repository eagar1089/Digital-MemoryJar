services:
  backend:
    build: .
    container_name: dmj-backend
    command: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      ENABLE_NLP_SCHEDULER: "false"
      CORS_ALLOW_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      MONGO_URI: "mongodb://host.docker.internal:27017/dmj"
      HF_API_TOKEN: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dmj-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana-oss:11.3.0
    container_name: dmj-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data: